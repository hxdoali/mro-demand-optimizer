apiVersion: v1
kind: Service
metadata:
  name: mro-api-service
  labels:
    app: mro-optimizer
spec:
  selector:
    app: mro-optimizer
    component: api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: mro-dashboard-service
  labels:
    app: mro-optimizer
spec:
  selector:
    app: mro-optimizer
    component: dashboard
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP
  type: ClusterIP
